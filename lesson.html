<!DOCTYPE html>
<html>
<head>
    <title>Lesson - Manathil Hindi</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .word { font-size: 60px; color: #ff9933; margin: 20px; }
        .options { display: flex; justify-content: center; gap: 10px; }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; 
            border: 2px solid #e5e5e5; border-radius: 10px; background: white;
        }
        .correct { background-color: #d7ffb8 !important; border-color: #58cc02 !important; }
        #next-btn { margin-top: 30px; background: #58cc02; color: white; display: none; }
    </style>
</head>
<body>

    <a href="index.html" style="float: left; text-decoration: none; font-size: 24px;">✕</a>
    
    <h2>Translate this word</h2>
    <div class="word">नमस्ते</div>

    <div class="options">
        <button onclick="check(this, 'Wrong')">Water</button>
        <button onclick="check(this, 'Correct')">Hello</button>
        <button onclick="check(this, 'Wrong')">Food</button>
    </div>

    <button id="next-btn" onclick="location.href='index.html'">FINISH LESSON</button>

    <script>
        function check(btn, status) {
            if(status === 'Correct') {
                btn.classList.add('correct');
                alert("Correct! Shabaash!");
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                btn.style.backgroundColor = '#ffcfcf';
                alert("Try again, bro!");
            }
        }
    </script>
</body>
</html>
